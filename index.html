<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL FLOW - Intelligence Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #02040a;
            background-image:
                linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
            background-size: 42px 42px;
            color: #e2e8f0;
            margin: 0;
            overflow-x: hidden;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.3); }
        .news-container { height: 480px; overflow-y: auto; scroll-behavior: smooth; }
        .news-card { border-bottom: 1px solid rgba(51, 65, 85, 0.2); transition: all 0.2s; padding: 12px; opacity: 0; animation: fadeIn 0.4s ease forwards; }
        .news-card:hover { background: rgba(255, 255, 255, 0.05); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        @media (prefers-reduced-motion: reduce) {
            .news-card { animation: none; opacity: 1; }
            .animate-pulse { animation: none; }
        }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        /* skeleton loading */
        .skel { background: linear-gradient(90deg, rgba(51,65,85,0.25) 25%, rgba(51,65,85,0.45) 37%, rgba(51,65,85,0.25) 63%); background-size: 400% 100%; animation: skel 1.4s ease infinite; border-radius: 6px; }
        @keyframes skel { 0% { background-position: 100% 50%; } 100% { background-position: 0 50%; } }

        /* status dot states */
        .dot-live { background: #10b981; }
        .dot-error { background: #ef4444; }
        .dot-loading { background: #f59e0b; }

        /* 구글 번역기 스타일 강제 고정 */
        #google_translate_element { height: 38px; overflow: hidden; border-radius: 8px; border: 1px solid #334155; background: #0f172a; }
        .goog-te-banner-frame.skiptranslate, .goog-te-gadget span { display: none !important; }
        .goog-te-gadget { color: transparent !important; font-size: 0 !important; }
        .goog-te-combo { background: #0f172a !important; color: #fff !important; border: none !important; padding: 5px !important; font-size: 12px !important; outline: none !important; }
        body { top: 0px !important; }
    </style>
</head>
<body class="p-3 md:p-6">

    <!-- HEADER: TITLE, CLOCKS, TRANSLATE -->
    <header class="max-w-[1800px] mx-auto mb-6">
        <div class="flex flex-col lg:flex-row justify-between items-center gap-6 mb-6">
            <div class="flex items-center gap-4">
                <h1 class="text-4xl font-black italic tracking-tighter text-white">GLOBAL <span class="text-blue-500">FLOW</span></h1>
                <div id="google_translate_element"></div>
            </div>

            <div class="flex gap-4 bg-slate-900/80 px-6 py-2 rounded-2xl border border-white/5 shadow-2xl">
                <div class="text-center px-4">
                    <p class="text-[9px] text-slate-500 font-bold uppercase tracking-tighter mb-1">Seoul</p>
                    <p id="time-kr" class="text-base font-mono font-bold text-white leading-none">00:00:00</p>
                </div>
                <div class="text-center px-4 border-l border-slate-800">
                    <p class="text-[9px] text-slate-500 font-bold uppercase tracking-tighter mb-1">New York</p>
                    <p id="time-us" class="text-base font-mono font-bold text-blue-400 leading-none">00:00:00</p>
                </div>
                <div class="text-center px-4 border-l border-slate-800">
                    <p class="text-[9px] text-slate-500 font-bold uppercase tracking-tighter mb-1">London</p>
                    <p id="time-uk" class="text-base font-mono font-bold text-amber-400 leading-none">00:00:00</p>
                </div>
            </div>
        </div>

        <!-- MARKET DATA BOARD -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 bg-white/5 p-3 rounded-2xl border border-white/5">
            <div class="flex flex-col items-center p-3 glass rounded-2xl">
                <span class="text-[10px] font-bold text-slate-500 uppercase mb-1">USD / KRW</span>
                <span id="val-usd" class="text-xl font-mono font-bold text-emerald-400">----.--</span>
            </div>
            <div class="flex flex-col items-center p-3 glass rounded-2xl min-h-[64px] justify-center">
                <span class="text-[10px] font-bold text-slate-500 uppercase mb-1">KOSPI</span>
                <div class="tradingview-widget-container w-full">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
                    { "symbol": "KRX:KOSPI", "colorTheme": "dark", "width": "100%", "isTransparent": true, "locale": "kr" }
                    </script>
                </div>
            </div>
            <div class="flex flex-col items-center p-3 glass rounded-2xl min-h-[64px] justify-center">
                <span class="text-[10px] font-bold text-slate-500 uppercase mb-1">KOSDAQ</span>
                <div class="tradingview-widget-container w-full">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
                    { "symbol": "KOSDAQ:KOSDAQ150", "colorTheme": "dark", "width": "100%", "isTransparent": true, "locale": "kr" }
                    </script>
                </div>
            </div>
            <div class="flex flex-col items-center p-3 glass rounded-2xl min-h-[64px] justify-center">
                <span class="text-[10px] font-bold text-slate-500 uppercase mb-1">NASDAQ</span>
                <div class="tradingview-widget-container w-full">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
                    { "symbol": "NASDAQ:IXIC", "colorTheme": "dark", "width": "100%", "isTransparent": true, "locale": "en" }
                    </script>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN NEWS AREA (TOP) -->
    <main class="max-w-[1800px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">

        <div class="lg:col-span-9 grid grid-cols-1 md:grid-cols-3 gap-4">
            <!-- KOREA FEED -->
            <section class="glass rounded-2xl overflow-hidden flex flex-col shadow-2xl">
                <div class="p-4 bg-blue-500/10 border-b border-white/5 flex justify-between items-center">
                    <h2 class="text-[11px] font-bold tracking-widest text-blue-400 uppercase">Korea Intelligence</h2>
                    <span id="status-news-kr" class="w-2 h-2 rounded-full dot-loading animate-pulse"></span>
                </div>
                <div id="news-kr" class="news-container"></div>
            </section>

            <!-- US FEED -->
            <section class="glass rounded-2xl overflow-hidden flex flex-col shadow-2xl">
                <div class="p-4 bg-red-500/10 border-b border-white/5 flex justify-between items-center">
                    <h2 class="text-[11px] font-bold tracking-widest text-red-400 uppercase">USA Intelligence</h2>
                    <span id="status-news-us" class="w-2 h-2 rounded-full dot-loading animate-pulse"></span>
                </div>
                <div id="news-us" class="news-container"></div>
            </section>

            <!-- WORLD FEED -->
            <section class="glass rounded-2xl overflow-hidden flex flex-col shadow-2xl">
                <div class="p-4 bg-emerald-500/10 border-b border-white/5 flex justify-between items-center">
                    <h2 class="text-[11px] font-bold tracking-widest text-emerald-400 uppercase">Global Briefing</h2>
                    <span id="status-news-global" class="w-2 h-2 rounded-full dot-loading animate-pulse"></span>
                </div>
                <div id="news-global" class="news-container"></div>
            </section>
        </div>

        <!-- SIDEBAR: WEATHER MAP -->
        <div class="lg:col-span-3 h-full">
            <div class="glass rounded-2xl overflow-hidden h-[540px] relative">
                <div class="p-4 bg-black/40 border-b border-white/5 absolute top-0 w-full z-10 flex justify-between items-center">
                    <h2 class="text-[10px] font-bold tracking-widest text-slate-400 uppercase">Live Weather Globe</h2>
                    <span id="refresh-countdown" class="text-[9px] font-mono text-slate-500"></span>
                </div>
                <iframe width="100%" height="100%" src="https://embed.windy.com/embed2.html?lat=37.5&lon=127.0&zoom=3&level=surface&overlay=wind&product=ecmwf&menu=&message=true&marker=&calendar=now&pressure=&type=map&location=coordinates&detail=&metricWind=default&metricTemp=default&radarRange=false" frameborder="0"></iframe>
            </div>
        </div>
    </main>

    <!-- SCRIPTS -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'auto', includedLanguages: 'ko,en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        // NOTE: rss2json's free tier is rate-limited (no api_key = shared pool).
        // Get a free key at https://rss2json.com/ and append &api_key=YOUR_KEY below
        // to the rssUrl requests if you start seeing "Signal Lost" often.
        const NEWS_API_BASE = "https://api.rss2json.com/v1/api.json?rss_url=";
        const REFRESH_INTERVAL_MS = 600000; // 10 min
        let secondsToRefresh = REFRESH_INTERVAL_MS / 1000;

        // Keep last-good data per feed so a failed fetch doesn't wipe the UI
        const lastGoodNews = { 'news-kr': null, 'news-us': null, 'news-global': null };

        // Escape any HTML so titles/authors from the feed can never inject markup
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str ?? '';
            return div.innerHTML;
        }

        function setStatus(containerId, state) {
            const dot = document.getElementById('status-' + containerId);
            if (!dot) return;
            dot.classList.remove('dot-live', 'dot-error', 'dot-loading');
            dot.classList.add(state === 'ok' ? 'dot-live' : state === 'error' ? 'dot-error' : 'dot-loading');
        }

        function renderSkeleton(container) {
            container.innerHTML = Array.from({ length: 6 }).map(() => `
                <div class="news-card">
                    <div class="skel h-2.5 w-16 mb-2"></div>
                    <div class="skel h-3.5 w-full mb-1"></div>
                    <div class="skel h-3.5 w-3/4"></div>
                </div>
            `).join('');
        }

        // 1. 뉴스 데이터 수집
        async function fetchAllNews() {
            getNews('속보 OR 정치 OR 경제 OR 재난 OR IT', 'ko', 'news-kr');
            getNews('US breaking politics economy', 'en', 'news-us');
            getNews('world news international geopolitics', 'en', 'news-global');
        }

        async function getNews(query, lang, containerId) {
            const container = document.getElementById(containerId);
            setStatus(containerId, 'loading');
            if (!lastGoodNews[containerId]) renderSkeleton(container);

            const rssUrl = encodeURIComponent(`https://news.google.com/rss/search?q=${query}&hl=${lang}&gl=${lang === 'ko' ? 'KR' : 'US'}&ceid=${lang === 'ko' ? 'KR:ko' : 'US:en'}`);
            try {
                const response = await fetch(NEWS_API_BASE + rssUrl);
                const data = await response.json();
                if (data.status === 'ok') {
                    lastGoodNews[containerId] = data.items;
                    renderNews(container, data.items);
                    setStatus(containerId, 'ok');
                } else {
                    throw new Error(data.message || 'feed error');
                }
            } catch (e) {
                setStatus(containerId, 'error');
                // Keep showing the last successful data instead of wiping it
                if (lastGoodNews[containerId]) {
                    renderNews(container, lastGoodNews[containerId]);
                } else {
                    container.innerHTML = "<p class='p-4 text-red-400 text-xs'>Signal lost — retrying next cycle</p>";
                }
            }
        }

        function renderNews(container, items) {
            container.innerHTML = items.map((item, i) => `
                <a href="${encodeURI(item.link)}" target="_blank" rel="noopener noreferrer" class="news-card block group" style="animation-delay:${i * 30}ms">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[9px] font-bold text-blue-500 uppercase">${escapeHtml(item.author || 'SOURCE')}</span>
                        <span class="text-[9px] text-slate-600 font-mono">${new Date(item.pubDate).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                    </div>
                    <h3 class="text-[13.5px] font-semibold text-slate-200 leading-snug group-hover:text-white transition-colors">${escapeHtml(item.title)}</h3>
                </a>
            `).join('');
        }

        // 2. 실시간 환율
        async function updateExchange() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await res.json();
                document.getElementById('val-usd').textContent = data.rates.KRW.toFixed(2);
            } catch (e) { document.getElementById('val-usd').textContent = "ERROR"; }
        }

        // 3. 세계 시계
        function updateClocks() {
            const opt = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('time-kr').textContent = new Intl.DateTimeFormat('ko-KR', { ...opt, timeZone: 'Asia/Seoul' }).format(new Date());
            document.getElementById('time-us').textContent = new Intl.DateTimeFormat('en-US', { ...opt, timeZone: 'America/New_York' }).format(new Date());
            document.getElementById('time-uk').textContent = new Intl.DateTimeFormat('en-GB', { ...opt, timeZone: 'Europe/London' }).format(new Date());
        }

        // 4. 다음 갱신까지 카운트다운
        function tickCountdown() {
            secondsToRefresh -= 1;
            if (secondsToRefresh <= 0) secondsToRefresh = REFRESH_INTERVAL_MS / 1000;
            const m = Math.floor(secondsToRefresh / 60).toString().padStart(2, '0');
            const s = Math.floor(secondsToRefresh % 60).toString().padStart(2, '0');
            const el = document.getElementById('refresh-countdown');
            if (el) el.textContent = `NEXT ${m}:${s}`;
        }

        window.onload = () => {
            lucide.createIcons();
            setInterval(updateClocks, 1000);
            setInterval(tickCountdown, 1000);
            setInterval(fetchAllNews, REFRESH_INTERVAL_MS);
            setInterval(updateExchange, 300000);
            updateClocks();
            fetchAllNews();
            updateExchange();
        };
    </script>
</body>
</html>
