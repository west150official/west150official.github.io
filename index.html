<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL FLOW - Hazard Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: #02040a;
            color: #e2e8f0;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            display: flex;
            flex-direction: column;
        }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(51, 65, 85, 0.4); }
        #map { flex-grow: 1; background: #02040a; z-index: 1; }
        .stat-card { padding: 10px 15px; border-radius: 8px; border-left: 3px solid #3b82f6; }
        .dot-live { width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 8px #10b981; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-2 gap-2">

    <!-- HEADER: LOGO & STATUS -->
    <header class="flex justify-between items-center bg-slate-900/80 p-3 rounded-xl border border-white/5">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold italic tracking-tighter text-blue-500 uppercase">Global Flow <span class="text-white">Hazard v2</span></h1>
            <div class="flex items-center gap-2 bg-black/40 px-3 py-1 rounded-full border border-white/5">
                <div class="dot-live"></div>
                <span class="text-[10px] font-bold">SYSTEM LIVE</span>
            </div>
        </div>
        <div id="refresh-countdown" class="text-[10px] text-slate-500">REFRESHING IN 10:00</div>
    </header>

    <!-- TOP BAR: TIME & WEATHER & FX -->
    <div class="grid grid-cols-3 gap-2 h-24">
        <!-- SEOUL -->
        <div class="glass rounded-xl p-3 flex justify-between items-center border-l-4 border-blue-500">
            <div>
                <p class="text-[10px] text-slate-500 font-bold">SEOUL / KOREA</p>
                <p id="time-kr" class="text-xl font-bold">00:00:00</p>
                <p id="weather-kr" class="text-[11px] text-blue-300">Loading...</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-slate-500 font-bold uppercase">USD/KRW</p>
                <p id="val-fx" class="text-xl font-bold text-emerald-400">----.--</p>
            </div>
        </div>
        <!-- NEW YORK -->
        <div class="glass rounded-xl p-3 flex justify-between items-center border-l-4 border-red-500">
            <div>
                <p class="text-[10px] text-slate-500 font-bold">NEW YORK / USA</p>
                <p id="time-us" class="text-xl font-bold text-red-400">00:00:00</p>
                <p id="weather-us" class="text-[11px] text-red-300">Loading...</p>
            </div>
            <div class="text-right opacity-30">
                <i data-lucide="cloud" class="w-8 h-8"></i>
            </div>
        </div>
        <!-- LONDON -->
        <div class="glass rounded-xl p-3 flex justify-between items-center border-l-4 border-amber-500">
            <div>
                <p class="text-[10px] text-slate-500 font-bold">LONDON / UK</p>
                <p id="time-uk" class="text-xl font-bold text-amber-400">00:00:00</p>
                <p id="weather-uk" class="text-[11px] text-amber-300">Loading...</p>
            </div>
            <div class="text-right opacity-30">
                <i data-lucide="wind" class="w-8 h-8"></i>
            </div>
        </div>
    </div>

    <!-- MAIN: DISASTER MAP -->
    <div class="flex-grow glass rounded-xl overflow-hidden relative">
        <div id="map"></div>
        <div class="absolute bottom-4 left-4 z-[1000] bg-black/80 p-3 rounded-lg border border-white/10 flex flex-col gap-2">
            <h3 class="text-[10px] font-bold text-slate-400 mb-1">LEGEND</h3>
            <div class="flex items-center gap-2 text-[10px]"><span class="w-3 h-3 rounded-full bg-red-600"></span> Earthquake Mag 4.5+</div>
            <div class="flex items-center gap-2 text-[10px]"><span class="w-3 h-3 rounded-full bg-blue-500"></span> Current Location</div>
        </div>
    </div>

    <script>
        const REFRESH_MS = 600000;
        let countdown = REFRESH_MS / 1000;
        let map;

        window.onload = () => {
            initMap();
            updateAll();
            setInterval(updateClocks, 1000);
            setInterval(tick, 1000);
            setInterval(updateAll, REFRESH_MS);
        };

        function initMap() {
            map = L.map('map', { center: [20, 0], zoom: 2, zoomControl: false, attributionControl: false });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        function updateAll() {
            updateFX();
            updateWeather();
            updateHazards();
        }

        // 1. 환율 (프록시 없이 직접 호출 - 빠름)
        async function updateFX() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await res.json();
                document.getElementById('val-fx').textContent = data.rates.KRW.toFixed(2);
            } catch (e) {}
        }

        // 2. 날씨 (Open-Meteo - 무료/무제한/빠름)
        async function updateWeather() {
            const cities = [
                { id: 'kr', lat: 37.56, lon: 126.97 }, // Seoul
                { id: 'us', lat: 40.71, lon: -74.00 }, // NY
                { id: 'uk', lat: 51.50, lon: -0.12 }   // London
            ];

            cities.forEach(async (city) => {
                try {
                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current_weather=true`);
                    const data = await res.json();
                    const temp = data.current_weather.temperature;
                    const code = data.current_weather.weathercode;
                    document.getElementById(`weather-${city.id}`).textContent = `${temp}°C / Code ${code}`;
                } catch (e) {}
            });
        }

        // 3. 재난 (USGS 지진 데이터 - 직접 호출)
        async function updateHazards() {
            try {
                const res = await fetch('https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/4.5_day.geojson');
                const data = await res.json();
                map.eachLayer(l => { if (l instanceof L.CircleMarker) map.removeLayer(l); });
                data.features.forEach(f => {
                    const [lon, lat] = f.geometry.coordinates;
                    L.circleMarker([lat, lon], {
                        radius: f.properties.mag * 2,
                        color: '#ef4444',
                        weight: 1,
                        fillColor: '#ef4444',
                        fillOpacity: 0.4
                    }).addTo(map).bindPopup(`<b>Mag ${f.properties.mag}</b><br>${f.properties.place}`);
                });
            } catch (e) {}
        }

        function updateClocks() {
            const f = (tz) => new Intl.DateTimeFormat('en-GB', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false, timeZone:tz }).format(new Date());
            document.getElementById('time-kr').textContent = f('Asia/Seoul');
            document.getElementById('time-us').textContent = f('America/New_York');
            document.getElementById('time-uk').textContent = f('Europe/London');
        }

        function tick() {
            countdown--;
            if (countdown <= 0) countdown = REFRESH_MS / 1000;
            const m = Math.floor(countdown / 60).toString().padStart(2, '0');
            const s = (countdown % 60).toString().padStart(2, '0');
            document.getElementById('refresh-countdown').textContent = `REFRESHING IN ${m}:${s}`;
        }
    </script>
</body>
</html>
