<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INFO FLOW</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      background: #02040a;
      color: #e2e8f0;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      overflow: hidden;
    }

    .map-container {
      height: 100vh;
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .panel {
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
    }

    .title {
      letter-spacing: 3px;
    }

    .item {
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding: 8px 0;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
      box-shadow: 0 0 10px #10b981;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      50% { opacity: .3; }
    }

    .tab-btn.active {
      background-color: #0891b2;
      color: #ffffff;
      font-weight: bold;
      border-color: #06b6d4;
    }
  </style>
</head>

<body>

  <div class="grid grid-cols-12 h-screen">

    <!-- 왼쪽 패널 -->
    <div class="col-span-3 p-3 space-y-3 overflow-y-auto h-screen z-10">

      <!-- 타이틀 영역 -->
      <div class="panel rounded-xl p-4">
        <h1 class="text-xl font-black text-cyan-400 title">
          INFO <span class="text-white">FLOW</span>
        </h1>
        <div class="flex items-center gap-2 text-xs mt-2">
          <div class="dot"></div>
          <span id="clock" class="text-cyan-200 font-mono">한국 시간 동기화 중...</span>
        </div>
      </div>

      <!-- 지진 정보 -->
      <div class="panel rounded-xl p-3">
        <h2 class="text-red-400 font-bold text-sm">🌍 지진 활동 (M4.5+)</h2>
        <div id="earth" class="text-xs mt-2">동기화 중...</div>
      </div>

      <!-- 대기질 정보 -->
      <div class="panel rounded-xl p-3">
        <h2 class="text-green-400 font-bold text-sm">🌫 공기질 지수 (AQI)</h2>
        <div id="air" class="text-xs mt-2">동기화 중...</div>
      </div>

      <!-- 태풍/열대저기압 정보 -->
      <div class="panel rounded-xl p-3">
        <h2 class="text-purple-400 font-bold text-sm">🌪 태풍 및 폭풍</h2>
        <div id="storm" class="text-xs mt-2">동기화 중...</div>
      </div>

      <!-- 우주 기상 -->
      <div class="panel rounded-xl p-3">
        <h2 class="text-yellow-400 font-bold text-sm">☀ 우주 기상 (태풍/자기장)</h2>
        <div id="solar" class="text-xs mt-2">동기화 중...</div>
      </div>

    </div>

    <!-- 오른쪽 지도 영역 -->
    <div class="col-span-9 relative h-screen">
      
      <!-- 지도 1: 실시간 관측 지도 -->
      <div id="map-obs" class="map-container"></div>
      
      <!-- 지도 2: 실시간 기상 흐름 지도 -->
      <div id="map-weather" class="map-container hidden"></div>

      <!-- 상단 중앙 지도 탭 전환 버튼 -->
      <div class="absolute top-4 left-1/2 -translate-x-1/2 z-[1000] flex gap-2 panel p-1.5 rounded-xl">
        <button id="btn-obs" onclick="switchMap('obs')" class="tab-btn active px-4 py-1.5 rounded-lg text-xs transition-all border border-transparent">
          📍 실시간 관측 지도
        </button>
        <button id="btn-weather" onclick="switchMap('weather')" class="tab-btn px-4 py-1.5 rounded-lg text-xs text-gray-300 hover:text-white transition-all border border-transparent">
          🌀 기상 흐름 지도
        </button>
      </div>

      <!-- 기상 지도용 레이어 선택 필터 (기상 지도 탭일 때만 표시) -->
      <div id="weather-controls" class="absolute top-16 left-1/2 -translate-x-1/2 z-[1000] hidden flex gap-1.5 panel p-1 rounded-lg text-[11px]">
        <button onclick="setWeatherLayer('wind')" class="px-2.5 py-1 bg-cyan-950/80 text-cyan-300 rounded hover:bg-cyan-800">💨 바람 흐름</button>

        <button onclick="setWeatherLayer('precip')" class="px-2.5 py-1 bg-slate-800 text-slate-300 rounded hover:bg-slate-700">🌧 강수량(비/눈)</button>

        <button onclick="setWeatherLayer('clouds')" class="px-2.5 py-1 bg-slate-800 text-slate-300 rounded hover:bg-slate-700">☁ 구름/위성</button>

        <button onclick="setWeatherLayer('temp')" class="px-2.5 py-1 bg-slate-800 text-slate-300 rounded hover:bg-slate-700">🌡 기온</button>
      </div>

      <!-- 우측 상단 ISS 위치 표시 -->
      <div class="absolute top-4 right-4 z-[1000] panel rounded-xl p-3 text-xs">
        <div class="text-cyan-400 font-bold mb-1">실시간 위성 추적 (KST)</div>
        <div id="iss">국제우주정거장(ISS) 동기화 중...</div>
      </div>

      <!-- 좌측 하단 지도 범례 (관측 지도일 때 표시) -->
      <div id="legend-obs" class="absolute bottom-4 left-4 z-[1000] panel rounded-xl p-3 text-xs leading-relaxed">
        🔴 지진 발생지<br>
        🟢 주요 도시 대기질<br>
        🔵 ISS (우주정거장)<br>
        🟠 활동 중인 태풍
      </div>

    </div>

  </div>

  <script>
    // ================================
    // 지도 초기화 (2개 독립 생성)
    // ================================
    
    // 1. 관측 지도 (Dark Matter)
    const mapObs = L.map('map-obs').setView([20, 0], 2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap &copy; CARTO',
      maxZoom: 19
    }).addTo(mapObs);

    // 2. 기상 흐름 지도
    const mapWeather = L.map('map-weather').setView([20, 0], 2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 19
    }).addTo(mapWeather);

    // 기상 레이어 변수
    let currentWeatherLayer = null;

    // 기상 레이어 변경 함수 (RainViewer & OpenStreetMap 계열 무료 레이어)
    function setWeatherLayer(type) {
      if (currentWeatherLayer) {
        mapWeather.removeLayer(currentWeatherLayer);
      }

      let tileUrl = '';
      if (type === 'wind') {
        tileUrl = 'https://tile.openweathermap.org/map/wind_new/{z}/{x}/{y}.png?appid=9de243494c0b295cca9337e1e96b00e2';
      } else if (type === 'precip') {
        tileUrl = 'https://tile.openweathermap.org/map/precipitation_new/{z}/{x}/{y}.png?appid=9de243494c0b295cca9337e1e96b00e2';
      } else if (type === 'clouds') {
        tileUrl = 'https://tile.openweathermap.org/map/clouds_new/{z}/{x}/{y}.png?appid=9de243494c0b295cca9337e1e96b00e2';
      } else if (type === 'temp') {
        tileUrl = 'https://tile.openweathermap.org/map/temp_new/{z}/{x}/{y}.png?appid=9de243494c0b295cca9337e1e96b00e2';
      }

      currentWeatherLayer = L.tileLayer(tileUrl, { opacity: 0.65 }).addTo(mapWeather);
    }
    
    // 기본 기상 레이어를 바람으로 설정
    setWeatherLayer('wind');

    // 지도 탭 전환 함수
    function switchMap(target) {
      const btnObs = document.getElementById('btn-obs');
      const btnWeather = document.getElementById('btn-weather');
      const mapObsEl = document.getElementById('map-obs');
      const mapWeatherEl = document.getElementById('map-weather');
      const weatherControls = document.getElementById('weather-controls');
      const legendObs = document.getElementById('legend-obs');

      if (target === 'obs') {
        mapObsEl.classList.remove('hidden');
        mapWeatherEl.classList.add('hidden');
        weatherControls.classList.add('hidden');
        legendObs.classList.remove('hidden');
        
        btnObs.classList.add('active');
        btnWeather.classList.remove('active');
        mapObs.invalidateSize();
      } else {
        mapObsEl.classList.add('hidden');
        mapWeatherEl.classList.remove('hidden');
        weatherControls.classList.remove('hidden');
        legendObs.classList.add('hidden');
        
        btnWeather.classList.add('active');
        btnObs.classList.remove('active');
        mapWeather.invalidateSize();
      }
    }

    // ================================
    // 관측 레이어 관리
    // ================================
    const layers = {
      earth: [],
      air: [],
      storm: [],
      iss: null
    };

    function clearLayer(layerArray) {
      layerArray.forEach(m => mapObs.removeLayer(m));
      layerArray.length = 0;
    }

    // ================================
    // 한국 시계 & ISS 추적
    // ================================
    function updateClock() {
      const now = new Date();
      const kstString = now.toLocaleString('ko-KR', {
        timeZone: 'Asia/Seoul',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      });
      document.getElementById('clock').innerText = `KST ${kstString}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    async function loadISS() {
      try {
        const res = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
        const data = await res.json();
        const { latitude, longitude, altitude, velocity } = data;

        document.getElementById('iss').innerHTML = `
          위도: ${latitude.toFixed(2)}° | 경도: ${longitude.toFixed(2)}°<br>
          고도: ${altitude.toFixed(0)} km | 속도: ${velocity.toFixed(0)} km/h
        `;

        if (layers.iss) {
          layers.iss.setLatLng([latitude, longitude]);
        } else {
          layers.iss = L.circleMarker([latitude, longitude], {
            radius: 8,
            color: '#3b82f6',
            fillColor: '#60a5fa',
            fillOpacity: 0.8
          }).addTo(mapObs);
          layers.iss.bindPopup('<b>🛰 국제우주정거장 (ISS)</b>');
        }
      } catch (e) {
        document.getElementById('iss').innerText = 'ISS 데이터 연결 불가';
      }
    }
    setInterval(loadISS, 5000);
    loadISS();

    // ================================
    // 데이터 수집 엔진
    // ================================

    // 1. 지진 정보
    async function loadEarthquake() {
      try {
        clearLayer(layers.earth);
        const res = await fetch("https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/4.5_day.geojson");
        const data = await res.json();

        document.getElementById("earth").innerHTML = `
          <div class="item">
            지난 24시간 감지 (규모 4.5+): <span class="text-red-400 font-bold">${data.features.length}건</span>
          </div>
        `;

        data.features.forEach(eq => {
          const [lon, lat] = eq.geometry.coordinates;
          const mag = eq.properties.mag;

          const marker = L.circleMarker([lat, lon], {
            radius: Math.max(mag * 2, 4),
            color: "#ef4444",
            fillColor: "#f87171",
            fillOpacity: 0.5
          }).addTo(mapObs);

          marker.bindPopup(`
            <b>지진 발생</b><br>
            규모: <b>${mag}</b><br>
            위치: ${eq.properties.place}
          `);

          layers.earth.push(marker);
        });
      } catch (e) {
        document.getElementById("earth").innerHTML = "지진 데이터 수집 실패";
      }
    }

    // 2. 대기질 정보
    async function loadAir() {
      clearLayer(layers.air);
      const cities = [
        { name: "서울", lat: 37.56, lon: 126.97 },
        { name: "도쿄", lat: 35.6, lon: 139.6 },
        { name: "뉴욕", lat: 40.7, lon: -74 },
        { name: "런던", lat: 51.5, lon: -0.1 }
      ];

      let html = "";

      for (const city of cities) {
        try {
          const res = await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${city.lat}&longitude=${city.lon}&current=us_aqi`);
          const data = await res.json();
          const aqi = data.current ? data.current.us_aqi : 'N/A';

          const colorClass = aqi > 100 ? 'text-red-400' : aqi > 50 ? 'text-yellow-400' : 'text-green-400';
          const statusText = aqi > 100 ? '나쁨' : aqi > 50 ? '보통' : '좋음';

          html += `
            <div class="item flex justify-between">
              <span>${city.name}</span>
              <span class="${colorClass}">${aqi} AQI (${statusText})</span>
            </div>
          `;

          const marker = L.circleMarker([city.lat, city.lon], {
            radius: 6,
            color: "#10b981",
            fillColor: "#34d399",
            fillOpacity: 0.6
          }).addTo(mapObs);

          marker.bindPopup(`<b>${city.name}</b><br>대기질 지수: ${aqi} (${statusText})`);
          layers.air.push(marker);

        } catch (e) {
          html += `
            <div class="item flex justify-between">
              <span>${city.name}</span>
              <span class="text-gray-500">연결 불가</span>
            </div>
          `;
        }
      }

      document.getElementById("air").innerHTML = html;
    }

    // 3. 우주 기상
    async function loadSolar() {
      try {
        const res = await fetch("https://services.swpc.noaa.gov/products/noaa-planetary-k-index.json");
        const data = await res.json();
        const kp = parseFloat(data[data.length - 1][1]);

        const status = kp >= 5 ? "지자기 폭풍" : kp >= 3 ? "활동적" : "조용함";
        const colorClass = kp >= 5 ? "text-red-400" : kp >= 3 ? "text-yellow-400" : "text-green-400";

        document.getElementById("solar").innerHTML = `
          <div class="item flex justify-between">
            <span>Kp 지수:</span>
            <span class="text-yellow-400 font-bold">${kp}</span>
          </div>
          <div class="flex justify-between mt-1">
            <span>태양 활동 상태:</span>
            <span class="${colorClass} font-bold">${status}</span>
          </div>
        `;
      } catch (e) {
        document.getElementById("solar").innerHTML = "우주 기상 데이터 실패";
      }
    }

    // 4. 태풍/폭풍
    async function loadStorm() {
      try {
        clearLayer(layers.storm);
        const res = await fetch("https://www.nhc.noaa.gov/CurrentStorms.json");
        const data = await res.json();
        const storms = data.activeStorms || [];

        document.getElementById("storm").innerHTML = `
          <div class="item">현재 활동 중인 폭풍: <span class="text-purple-400 font-bold">${storms.length}개</span></div>
        `;

        storms.forEach(storm => {
          if (storm.latitude && storm.longitude) {
            const marker = L.circleMarker([storm.latitude, storm.longitude], {
              radius: 8,
              color: "#c084fc",
              fillColor: "#a855f7",
              fillOpacity: 0.7
            }).addTo(mapObs);

            marker.bindPopup(`🌪 <b>${storm.name}</b>`);
            layers.storm.push(marker);
          }
        });
      } catch (e) {
        document.getElementById("storm").innerHTML = `
          <div class="item">현재 활동 중인 폭풍: <span class="text-gray-400 font-bold">0개</span></div>
        `;
      }
    }

    // 실행
    function runGlobalSystems() {
      loadEarthquake();
      loadAir();
      loadSolar();
      loadStorm();
    }

    runGlobalSystems();
    setInterval(runGlobalSystems, 600000);
  </script>
</body>

</html>
