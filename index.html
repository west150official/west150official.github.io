<script>

// ================================

// ----------------
// Earthquake USGS
// ----------------

async function loadEarthquake(){

try{


const res =
await fetch(
"https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/4.5_day.geojson"
);


const data =
await res.json();



document.getElementById("earth")
.innerHTML=
`
<div class="item">
EVENTS :
${data.features.length}
</div>
`;



data.features.forEach(eq=>{


const [
lon,
lat
]
=
eq.geometry.coordinates;



let mag =
eq.properties.mag;



let marker =
L.circleMarker(

[lat,lon],

{

radius:
mag*2,

color:
"#ef4444",

fillOpacity:
0.35

}

)

.addTo(map);



marker.bindPopup(

`
<b>
EARTHQUAKE
</b>
<br>

Magnitude:
${mag}

<br>

${eq.properties.place}

`

);



layers.earth.push(marker);



});



}catch(e){

document.getElementById("earth")
.innerHTML=
"DATA ERROR";


}


}






// ----------------
// Air Quality
// ----------------


async function loadAir(){



const cities=[


{
name:"SEOUL",
lat:37.56,
lon:126.97
},

{
name:"TOKYO",
lat:35.6,
lon:139.6
},


{
name:"NEW YORK",
lat:40.7,
lon:-74
},


{
name:"LONDON",
lat:51.5,
lon:-0.1
}


];



let html="";



for(
const city
of cities
){


try{


let res =
await fetch(

`https://air-quality-api.open-meteo.com/v1/air-quality?
latitude=${city.lat}
&longitude=${city.lon}
&current=us_aqi`

.replace(/\s/g,"")

);



let data =
await res.json();



let aqi =
data.current.us_aqi;



html +=

`

<div class="item flex justify-between">

<span>
${city.name}
</span>

<span class="
${aqi>100?
'text-red-400':
aqi>50?
'text-yellow-400':
'text-green-400'}

">

${aqi}

</span>


</div>

`;



let marker =
L.circleMarker(

[
city.lat,
city.lon
],

{

radius:7,

color:"#10b981",

fillOpacity:.6

}

)

.addTo(map);



layers.air.push(marker);



}

catch(e){}



}



document.getElementById("air")
.innerHTML=
html;



}







// ----------------
// Solar Weather NOAA
// ----------------


async function loadSolar(){


try{


let res =
await fetch(

"https://services.swpc.noaa.gov/products/noaa-planetary-k-index.json"

);



let data =
await res.json();



let kp =
data[data.length-1][1];



let status =
kp>=5?
"STORM":

kp>=3?
"ACTIVE":

"QUIET";



document.getElementById("solar")
.innerHTML=

`

<div class="item">

Kp INDEX :

<span class="text-yellow-400">

${kp}

</span>

</div>


<div>

STATUS :

${status}

</div>

`;



}catch(e){


document.getElementById("solar")
.innerHTML=
"NO DATA";


}


}








// ----------------
// Volcano
// ----------------


async function loadVolcano(){


document.getElementById("volcano")
.innerHTML=

`

<div class="item">

GLOBAL VOLCANIC ACTIVITY

</div>


<div>

SOURCE:

Smithsonian GVP

</div>

`;



}







// ----------------
// Ocean
// ----------------


async function loadOcean(){



document.getElementById("ocean")
.innerHTML=

`

<div class="item">

SEA MONITOR

</div>


<div>

NOAA MARINE DATA

</div>


<div class="text-green-400">

STATUS NORMAL

</div>

`;



}







// ----------------
// Storm
// ----------------


async function loadStorm(){


try{


let res =
await fetch(

"https://www.nhc.noaa.gov/CurrentStorms.json"

);



let data =
await res.json();



let storms =
data.activeStorms;



document.getElementById("storm")
.innerHTML=

`

ACTIVE:

${storms.length}

`;



storms.forEach(
storm=>{


if(
storm.latitude &&
storm.longitude
){


let marker =
L.marker(

[
storm.latitude,
storm.longitude
]

)

.addTo(map);



marker.bindPopup(

`
🌪
${storm.name}

`

);



layers.storm.push(marker);


}


}

);



}

catch(e){


document.getElementById("storm")
.innerHTML=
"NO ACTIVE STORM";


}


}







// ----------------
// RUN ALL SYSTEMS
// ----------------


function runGlobalSystems(){


loadEarthquake();

loadAir();

loadSolar();

loadVolcano();

loadOcean();

loadStorm();


}





runGlobalSystems();



setInterval(
runGlobalSystems,
600000
);

    
<button
onclick="generatePlanetReport()"
class="
mt-3
px-3
py-2
bg-cyan-700
rounded
text-xs
">

GENERATE AI REPORT

</button>

    // ===================================
// AI PLANETARY INTELLIGENCE ENGINE
// ===================================


let planetState={

earthquakes:0,

airQuality:"unknown",

storms:0,

solar:"unknown",

timestamp:null

};





// -------------------------
// Gather Map Events
// -------------------------


function collectPlanetData(){



planetState={

earthquakes:
layers.earth.length,


airQuality:
document
.getElementById("air")
.innerText,


storms:
layers.storm.length,


solar:
document
.getElementById("solar")
.innerText,


timestamp:
new Date()
.toISOString()

};



return planetState;


}







// -------------------------
// Local LLM Request
// -------------------------


async function generatePlanetReport(){



let state =
collectPlanetData();



document
.getElementById("ai")
.innerHTML=
`
<div class="text-cyan-400">
AI ANALYZING...
</div>
`;



let prompt = `

You are a planetary monitoring AI.

Analyze this public data dashboard.

Return a short report.

Rules:
- Do not predict disasters.
- Only summarize current conditions.
- Use clear sections.

DATA:

${JSON.stringify(
state,
null,
2
)}


Format:


🌍 EARTH

🌫 ATMOSPHERE

🌪 STORMS

☀ SPACE

OVERALL STATUS


`;





try{



let response =
await fetch(

"http://localhost:11434/api/generate",

{

method:"POST",

headers:{

"Content-Type":
"application/json"

},


body:

JSON.stringify({

model:"llama3",

prompt:prompt,

stream:false


})


}

);



let result =
await response.json();



document
.getElementById("ai")
.innerHTML=

`

<div class="leading-5">

${result.response
.replace(/\n/g,"<br>")}

</div>

`;




}

catch(e){



document
.getElementById("ai")
.innerHTML=

`

<span class="text-red-400">

LOCAL AI OFFLINE

</span>


<br>


Run:

ollama serve

`;



}



}
