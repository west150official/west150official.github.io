<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL FLOW - Intelligence Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #010204; color: #e2e8f0; overflow-x: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(8px); border: 1px solid rgba(51, 65, 85, 0.4); }
        .news-container { height: 450px; overflow-y: auto; }
        .news-card { border-bottom: 1px solid rgba(51, 65, 85, 0.2); transition: all 0.2s; }
        .news-card:hover { background: rgba(255, 255, 255, 0.03); }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        /* 구글 번역 스타일 숨기기 */
        .goog-te-banner-frame.skiptranslate { display: none !important; }
        body { top: 0px !important; }
    </style>
</head>
<body class="p-2 md:p-4">

    <!-- TOP BAR: Title & Translation -->
    <header class="flex flex-col md:flex-row justify-between items-center mb-4 px-4 gap-4">
        <div class="flex items-center gap-4">
            <h1 class="text-3xl font-black italic tracking-tighter text-white">GLOBAL <span class="text-blue-500">FLOW</span></h1>
            <div id="google_translate_element" class="scale-90"></div>
        </div>

        <!-- WORLD CLOCKS -->
        <div class="flex gap-6">
            <div class="text-center">
                <p class="text-[9px] text-slate-500 font-bold uppercase">Seoul</p>
                <p id="time-kr" class="text-sm font-mono font-bold text-white">00:00:00</p>
            </div>
            <div class="text-center border-l border-slate-800 pl-6">
                <p class="text-[9px] text-slate-500 font-bold uppercase">New York</p>
                <p id="time-us" class="text-sm font-mono font-bold text-blue-400">00:00:00</p>
            </div>
            <div class="text-center border-l border-slate-800 pl-6">
                <p class="text-[9px] text-slate-500 font-bold uppercase">London</p>
                <p id="time-uk" class="text-sm font-mono font-bold text-amber-400">00:00:00</p>
            </div>
        </div>
    </header>

    <!-- MARKET CHARTS SECTION -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-2 mb-4">
        <!-- TradingView Widget들 -->
        <div class="glass rounded-xl overflow-hidden h-32" id="chart-usd"></div>
        <div class="glass rounded-xl overflow-hidden h-32" id="chart-kospi"></div>
        <div class="glass rounded-xl overflow-hidden h-32" id="chart-kosdaq"></div>
        <div class="glass rounded-xl overflow-hidden h-32" id="chart-nasdaq"></div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4">
        
        <!-- NEWS COLUMNS (9 units wide) -->
        <div class="lg:col-span-8 grid grid-cols-1 md:grid-cols-3 gap-3">
            <!-- KOREA NEWS -->
            <section class="glass rounded-2xl overflow-hidden flex flex-col">
                <div class="p-3 bg-white/5 border-b border-white/5 flex justify-between items-center">
                    <h2 class="text-[10px] font-bold tracking-widest text-blue-400 uppercase">Korea Feed</h2>
                    <i data-lucide="bell" class="w-3 h-3 text-blue-400"></i>
                </div>
                <div id="news-kr" class="news-container p-2"></div>
            </section>

            <!-- USA NEWS -->
            <section class="glass rounded-2xl overflow-hidden flex flex-col">
                <div class="p-3 bg-white/5 border-b border-white/5 flex justify-between items-center">
                    <h2 class="text-[10px] font-bold tracking-widest text-red-400 uppercase">US Briefing</h2>
                    <i data-lucide="zap" class="w-3 h-3 text-red-400"></i>
                </div>
                <div id="news-us" class="news-container p-2"></div>
            </section>

            <!-- GLOBAL NEWS -->
            <section class="glass rounded-2xl overflow-hidden flex flex-col">
                <div class="p-3 bg-white/5 border-b border-white/5 flex justify-between items-center">
                    <h2 class="text-[10px] font-bold tracking-widest text-emerald-400 uppercase">Global News</h2>
                    <i data-lucide="globe" class="w-3 h-3 text-emerald-400"></i>
                </div>
                <div id="news-global" class="news-container p-2"></div>
            </section>
        </div>

        <!-- WEATHER & GLOBAL MAP (4 units wide) -->
        <div class="lg:col-span-4 space-y-4">
            <div class="glass rounded-2xl overflow-hidden h-[450px]">
                <div class="p-3 bg-white/5 border-b border-white/5">
                    <h2 class="text-[10px] font-bold tracking-widest text-slate-400 uppercase">Global Weather Map</h2>
                </div>
                <!-- Windy.com Globe Embed -->
                <iframe width="100%" height="100%" src="https://embed.windy.com/embed2.html?lat=37.566&lon=126.978&zoom=3&level=surface&overlay=wind&product=ecmwf&menu=&message=true&marker=&calendar=now&pressure=&type=map&location=coordinates&detail=&metricWind=default&metricTemp=default&radarRange=false" frameborder="0"></iframe>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <!-- TradingView Widget Script -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <!-- Google Translate Script -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'en', includedLanguages: 'ko', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        // 뉴스 검색 쿼리 대폭 강화 (다양한 매체 및 키워드 포함)
        const QUERIES = {
            kr: '속보 OR 정치 OR 경제 OR 재난 OR IT OR 사회 OR 과학',
            us: 'Breaking OR Politics OR Economy OR Market OR Tech OR Disaster',
            global: 'World News OR International OR United Nations OR G7 OR Geopolitics'
        };

        // 1. 시계 기능
        function updateClocks() {
            const options = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('time-kr').textContent = new Intl.DateTimeFormat('ko-KR', { ...options, timeZone: 'Asia/Seoul' }).format(new Date());
            document.getElementById('time-us').textContent = new Intl.DateTimeFormat('en-US', { ...options, timeZone: 'America/New_York' }).format(new Date());
            document.getElementById('time-uk').textContent = new Intl.DateTimeFormat('en-GB', { ...options, timeZone: 'Europe/London' }).format(new Date());
        }

        // 2. 뉴스 가져오기
        async function fetchNews(query, lang, containerId) {
            const container = document.getElementById(containerId);
            const region = lang === 'ko' ? 'KR' : 'US';
            const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=${lang}&gl=${region}&ceid=${region}:${lang}`;
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                if (data.status === 'ok') {
                    container.innerHTML = data.items.map(item => `
                        <a href="${item.link}" target="_blank" class="news-card block p-3 group">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-[9px] font-bold text-slate-500 uppercase">${item.author || 'SOURCE'}</span>
                                <span class="text-[8px] text-slate-600 font-mono">${new Date(item.pubDate).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                            </div>
                            <h3 class="text-xs font-semibold text-slate-300 group-hover:text-white transition-colors line-clamp-2">${item.title}</h3>
                        </a>
                    `).join('');
                }
            } catch (e) { container.innerHTML = "Feed Error"; }
        }

        // 3. 차트 생성 (TradingView 미니 캔들차트)
        function createChart(container, symbol, label) {
            new TradingView.MediumWidget({
                "container_id": container,
                "symbols": [[label, symbol]],
                "greyText": "Default",
                "gridLineColor": "rgba(233, 233, 234, 0)",
                "fontColor": "white",
                "underLineColor": "rgba(41, 98, 255, 0.3)",
                "trendLineColor": "#2962ff",
                "width": "100%", "height": "100%",
                "locale": "ko", "colorTheme": "dark", "autosize": true, "showVolume": false,
            });
        }

        function init() {
            lucide.createIcons();
            setInterval(updateClocks, 1000);
            
            // 뉴스 호출
            fetchNews(QUERIES.kr, 'ko', 'news-kr');
            fetchNews(QUERIES.us, 'en', 'news-us');
            fetchNews(QUERIES.global, 'en', 'news-global');

            // 차트 호출 (심볼 설정)
            createChart("chart-usd", "FX_IDC:USDKRW", "환율");
            createChart("chart-kospi", "KRX:KOSPI", "코스피");
            createChart("chart-kosdaq", "KRX:KOSDAQ", "코스닥");
            createChart("chart-nasdaq", "NASDAQ:IXIC", "나스닥");

            // 15분마다 뉴스 갱신
            setInterval(() => {
                fetchNews(QUERIES.kr, 'ko', 'news-kr');
                fetchNews(QUERIES.us, 'en', 'news-us');
                fetchNews(QUERIES.global, 'en', 'news-global');
            }, 900000);
        }

        window.onload = init;
    </script>
</body>
</html>
