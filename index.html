<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL FLOW</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #05070a; color: #e2e8f0; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(51, 65, 85, 0.3); }
        .news-container { height: 500px; overflow-y: auto; scroll-behavior: smooth; }
        .news-card { border-bottom: 1px solid rgba(51, 65, 85, 0.2); transition: all 0.2s; padding: 12px; }
        .news-card:hover { background: rgba(255, 255, 255, 0.05); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        #google_translate_element { margin-bottom: 0; }
        .goog-te-banner-frame.skiptranslate { display: none !important; }
        body { top: 0px !important; }
    </style>
</head>
<body class="p-4">

    <!-- HEADER -->
    <header class="max-w-[1800px] mx-auto mb-6 flex flex-col lg:flex-row justify-between items-center gap-6">
        <div class="flex items-center gap-6">
            <h1 class="text-4xl font-black italic tracking-tighter text-white">GLOBAL <span class="text-blue-500 font-normal">FLOW</span></h1>
            <div id="google_translate_element" class="p-1 border border-slate-800 rounded bg-black/50"></div>
        </div>

        <!-- WORLD CLOCKS -->
        <div class="flex gap-8 bg-slate-900/50 px-6 py-3 rounded-2xl border border-white/5">
            <div class="text-center">
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1">Seoul</p>
                <p id="time-kr" class="text-lg font-mono font-bold text-white leading-none">00:00:00</p>
            </div>
            <div class="text-center border-l border-slate-800 pl-8">
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1">New York</p>
                <p id="time-us" class="text-lg font-mono font-bold text-blue-400 leading-none">00:00:00</p>
            </div>
            <div class="text-center border-l border-slate-800 pl-8">
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1">London</p>
                <p id="time-uk" class="text-lg font-mono font-bold text-amber-400 leading-none">00:00:00</p>
            </div>
        </div>
    </header>

    <!-- MARKET CHARTS -->
    <div class="max-w-[1800px] mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <div class="glass rounded-2xl overflow-hidden h-48" id="chart-usd"></div>
        <div class="glass rounded-2xl overflow-hidden h-48" id="chart-kospi"></div>
        <div class="glass rounded-2xl overflow-hidden h-48" id="chart-kosdaq"></div>
        <div class="glass rounded-2xl overflow-hidden h-48" id="chart-nasdaq"></div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="max-w-[1800px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- NEWS SECTION -->
        <div class="lg:col-span-9 grid grid-cols-1 md:grid-cols-3 gap-4">
            <!-- KOREA FEED -->
            <section class="glass rounded-3xl overflow-hidden flex flex-col">
                <div class="p-4 bg-blue-500/10 border-b border-white/5 flex justify-between items-center">
                    <h2 class="text-xs font-bold tracking-widest text-blue-400 uppercase">Korea Intelligence</h2>
                    <i data-lucide="refresh-cw" onclick="fetchKR()" class="w-3 h-3 cursor-pointer hover:rotate-180 transition-transform"></i>
                </div>
                <div id="news-kr" class="news-container">
                    <p class="p-6 text-slate-600 text-sm animate-pulse">신호를 가져오는 중...</p>
                </div>
            </section>

            <!-- US FEED -->
            <section class="glass rounded-3xl overflow-hidden flex flex-col">
                <div class="p-4 bg-red-500/10 border-b border-white/5 flex justify-between items-center">
                    <h2 class="text-xs font-bold tracking-widest text-red-400 uppercase">USA Intelligence</h2>
                    <i data-lucide="refresh-cw" onclick="fetchUS()" class="w-3 h-3 cursor-pointer hover:rotate-180 transition-transform"></i>
                </div>
                <div id="news-us" class="news-container">
                    <p class="p-6 text-slate-600 text-sm animate-pulse">Waiting for US signal...</p>
                </div>
            </section>

            <!-- WORLD FEED -->
            <section class="glass rounded-3xl overflow-hidden flex flex-col">
                <div class="p-4 bg-emerald-500/10 border-b border-white/5 flex justify-between items-center">
                    <h2 class="text-xs font-bold tracking-widest text-emerald-400 uppercase">Global Flow</h2>
                    <i data-lucide="refresh-cw" onclick="fetchGlobal()" class="w-3 h-3 cursor-pointer hover:rotate-180 transition-transform"></i>
                </div>
                <div id="news-global" class="news-container">
                    <p class="p-6 text-slate-600 text-sm animate-pulse">Syncing Global Data...</p>
                </div>
            </section>
        </div>

        <!-- SIDEBAR (Weather Map) -->
        <div class="lg:col-span-3">
            <div class="glass rounded-3xl overflow-hidden h-[570px] relative">
                <div class="p-4 bg-white/5 border-b border-white/5 absolute top-0 w-full z-10 backdrop-blur-md">
                    <h2 class="text-[10px] font-bold tracking-widest text-slate-400 uppercase">Live Planet Weather</h2>
                </div>
                <iframe width="100%" height="100%" src="https://embed.windy.com/embed2.html?lat=35.0&lon=127.0&zoom=3&level=surface&overlay=wind&product=ecmwf&menu=&message=true&marker=&calendar=now&pressure=&type=map&location=coordinates&detail=&metricWind=default&metricTemp=default&radarRange=false" frameborder="0"></iframe>
            </div>
        </div>
    </main>

    <!-- TRADINGVIEW SCRIPT -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <!-- GOOGLE TRANSLATE -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'auto', includedLanguages: 'ko,en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        // 뉴스 쿼리 단순화 및 강화
        const NEWS_API_BASE = "https://api.rss2json.com/v1/api.json?rss_url=";
        
        async function getNews(query, lang, containerId) {
            const container = document.getElementById(containerId);
            const region = lang === 'ko' ? 'KR' : 'US';
            const rssUrl = encodeURIComponent(`https://news.google.com/rss/search?q=${query}&hl=${lang}&gl=${region}&ceid=${region}:${lang}`);
            
            try {
                const response = await fetch(NEWS_API_BASE + rssUrl);
                const data = await response.json();
                if (data.status === 'ok') {
                    container.innerHTML = data.items.map(item => `
                        <a href="${item.link}" target="_blank" class="news-card block">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-[9px] font-bold text-blue-500 uppercase">${item.author || 'News'}</span>
                                <span class="text-[9px] text-slate-600 font-mono">${new Date(item.pubDate).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                            </div>
                            <h3 class="text-[13px] font-semibold text-slate-200 leading-snug group-hover:text-white">${item.title}</h3>
                        </a>
                    `).join('');
                }
            } catch (e) { container.innerHTML = "<p class='p-4 text-red-400'>Feed Load Error</p>"; }
        }

        function createChart(container, symbol) {
            new TradingView.widget({
                "autosize": true, "symbol": symbol, "interval": "D", "timezone": "Asia/Seoul",
                "theme": "dark", "style": "1", "locale": "ko", "toolbar_bg": "#f1f3f6",
                "enable_publishing": false, "hide_top_toolbar": true, "save_image": false,
                "container_id": container
            });
        }

        function updateClocks() {
            const opt = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('time-kr').textContent = new Intl.DateTimeFormat('ko-KR', { ...opt, timeZone: 'Asia/Seoul' }).format(new Date());
            document.getElementById('time-us').textContent = new Intl.DateTimeFormat('en-US', { ...opt, timeZone: 'America/New_York' }).format(new Date());
            document.getElementById('time-uk').textContent = new Intl.DateTimeFormat('en-GB', { ...opt, timeZone: 'Europe/London' }).format(new Date());
        }

        function fetchKR() { getNews('정치 OR 경제 OR 속보 OR 사고', 'ko', 'news-kr'); }
        function fetchUS() { getNews('US politics OR US economy OR breaking news', 'en', 'news-us'); }
        function fetchGlobal() { getNews('world news OR international OR geopolitics', 'en', 'news-global'); }

        window.onload = () => {
            lucide.createIcons();
            setInterval(updateClocks, 1000);
            fetchKR(); fetchUS(); fetchGlobal();
            
            // 차트 심볼 변경 (더 범용적인 심볼 사용)
            createChart("chart-usd", "FX_IDC:USDKRW");
            createChart("chart-kospi", "KRX:KOSPI");
            createChart("chart-kosdaq", "KRX:KOSDAQ");
            createChart("chart-nasdaq", "NASDAQ:IXIC");
        };
    </script>
</body>
</html>
