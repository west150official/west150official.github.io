<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE COMMAND CENTER - GLOBAL FEED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #05070a; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.4); }
        .news-card { transition: all 0.3s ease; border-bottom: 1px solid rgba(51, 65, 85, 0.3); }
        .news-card:hover { background: rgba(255, 255, 255, 0.03); transform: translateX(4px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <!-- HEADER -->
    <header class="max-w-[1600px] mx-auto mb-8 flex flex-col md:flex-row justify-between items-end gap-6">
        <div>
            <div class="flex items-center gap-3 mb-2">
                <div class="flex items-center gap-2 px-3 py-1 bg-emerald-500/10 border border-emerald-500/20 rounded-full">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    <span class="text-[10px] font-bold text-emerald-500 tracking-widest uppercase font-mono">System Live</span>
                </div>
                <span id="clock" class="text-slate-500 font-mono text-xs tracking-wider">00:00:00 KST</span>
            </div>
            <h1 class="text-4xl font-black tracking-tighter text-white italic uppercase">Global <span class="text-slate-700 font-normal">Command Center</span></h1>
        </div>
        
        <div class="flex items-center gap-8 border-l border-slate-800 pl-8">
            <div class="text-right">
                <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">USD / KRW</p>
                <p class="text-2xl font-mono font-bold text-white tracking-tighter" id="header-usd">0,000.00</p>
            </div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- 한국 뉴스 (KOREA NEWS) -->
        <div class="lg:col-span-5 glass rounded-[2rem] p-6 flex flex-col h-[700px]">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-2 text-blue-400 font-bold text-xs uppercase tracking-[0.2em]">
                    <i data-lucide="globe-2" class="w-4 h-4"></i> Korea Economic News
                </div>
                <span class="text-[10px] text-slate-500">LIVE FEED</span>
            </div>
            <div id="kr-news-container" class="space-y-2 overflow-y-auto pr-2">
                <p class="text-slate-500 animate-pulse text-sm">데이터를 불러오는 중...</p>
            </div>
        </div>

        <!-- 미국 뉴스 (USA NEWS) -->
        <div class="lg:col-span-5 glass rounded-[2rem] p-6 flex flex-col h-[700px]">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-2 text-amber-400 font-bold text-xs uppercase tracking-[0.2em]">
                    <i data-lucide="trending-up" class="w-4 h-4"></i> US Market News
                </div>
                <span class="text-[10px] text-slate-500">REALTIME</span>
            </div>
            <div id="us-news-container" class="space-y-2 overflow-y-auto pr-2">
                <p class="text-slate-500 animate-pulse text-sm">Loading Global Data...</p>
            </div>
        </div>

        <!-- 사이드바 시장 지표 -->
        <div class="lg:col-span-2 space-y-4">
            <div class="glass p-6 rounded-[2rem] border-l-4 border-l-emerald-500">
                <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">현재 환율</p>
                <h3 class="text-2xl font-mono font-bold text-white" id="main-usd">---.--</h3>
                <p class="text-[10px] text-emerald-500 font-bold mt-1">KRW/USD</p>
            </div>
            
            <div class="glass p-6 rounded-[2rem]">
                <p class="text-[10px] text-slate-500 font-bold uppercase mb-4 tracking-widest">Market Status</p>
                <div class="space-y-4">
                    <div class="flex justify-between items-end">
                        <span class="text-xs font-bold text-slate-400 font-mono tracking-tighter">KOSPI</span>
                        <span class="text-sm font-bold text-red-500">2,652.1 ▲</span>
                    </div>
                    <div class="flex justify-between items-end">
                        <span class="text-xs font-bold text-slate-400 font-mono tracking-tighter">NASDAQ</span>
                        <span class="text-sm font-bold text-red-500">16,274.9 ▲</span>
                    </div>
                    <div class="flex justify-between items-end pt-4 border-t border-slate-800">
                        <span class="text-xs font-bold text-slate-400 font-mono tracking-tighter">BITCOIN</span>
                        <span class="text-sm font-bold text-emerald-500">$64,120</span>
                    </div>
                </div>
            </div>

            <button onclick="fetchAllData()" class="w-full py-4 bg-white/5 hover:bg-white/10 border border-slate-700 rounded-2xl text-[10px] font-bold uppercase tracking-widest transition-all">
                Manual Refresh
            </button>
        </div>
    </main>

    <script>
        // 뉴스 가져오기 통합 함수
        async function fetchNews(query, lang, containerId) {
            const container = document.getElementById(containerId);
            const encodedQuery = encodeURIComponent(query);
            // 구글 뉴스 RSS를 JSON으로 변환해주는 프록시 서비스 이용
            const rssUrl = `https://news.google.com/rss/search?q=${encodedQuery}&hl=${lang}&gl=${lang === 'ko' ? 'KR' : 'US'}&ceid=${lang === 'ko' ? 'KR:ko' : 'US:en'}`;
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                if (data.status === 'ok') {
                    container.innerHTML = '';
                    data.items.slice(0, 10).forEach(item => {
                        const date = new Date(item.pubDate).toLocaleTimeString(lang === 'ko' ? 'ko-KR' : 'en-US', {
                            hour: '2-digit', 
                            minute: '2-digit'
                        });
                        
                        const card = document.createElement('a');
                        card.href = item.link;
                        card.target = "_blank";
                        card.className = "block news-card p-4 rounded-xl transition-all";
                        card.innerHTML = `
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-[9px] font-bold text-slate-500 font-mono">${date}</span>
                                <span class="text-[9px] text-slate-600">|</span>
                                <span class="text-[9px] text-slate-500 uppercase">${item.author || 'News'}</span>
                            </div>
                            <h3 class="text-sm font-semibold text-slate-200 leading-snug group-hover:text-white transition-colors">
                                ${item.title}
                            </h3>
                        `;
                        container.appendChild(card);
                    });
                }
            } catch (error) {
                container.innerHTML = `<p class="text-xs text-red-500/50">데이터를 불러오는 중 오류가 발생했습니다.</p>`;
            }
        }

        // 환율 정보
        async function fetchExchangeRate() {
            try {
                const response = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await response.json();
                const rate = data.rates.KRW.toLocaleString('ko-KR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                
                document.getElementById('header-usd').textContent = rate;
                document.getElementById('main-usd').textContent = rate;
            } catch (error) {
                console.error('Exchange rate fail');
            }
        }

        function fetchAllData() {
            fetchNews('대한민국 경제 증시', 'ko', 'kr-news-container');
            fetchNews('US Stock Market Economy', 'en', 'us-news-container');
            fetchExchangeRate();
        }

        function init() {
            lucide.createIcons();
            fetchAllData();
            
            // 시계
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock').textContent = now.toLocaleTimeString('ko-KR', { hour12: false }) + ' KST';
            }, 1000);

            // 15분마다 자동 새로고침
            setInterval(fetchAllData, 900000);
        }

        init();
    </script>
</body>
</html>
