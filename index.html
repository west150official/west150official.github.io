<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL FLOW - Hazard Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 지도 엔진: Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: #02040a;
            color: #e2e8f0;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(51, 65, 85, 0.4); }
        
        /* 지도가 들어갈 컨테이너의 높이를 확실하게 설정 */
        #map-container {
            flex: 1; 
            width: 100%;
            position: relative;
            min-height: 0; /* flex 자식의 높이 붕괴 방지 */
        }
        #map { 
            position: absolute;
            top: 0; bottom: 0; left: 0; right: 0;
            background: #02040a; 
        }

        .dot-live { width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 8px #10b981; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        
        /* 팝업 스타일 수정 */
        .leaflet-popup-content-wrapper { background: #0f172a !important; color: white !important; border: 1px solid #334155; }
        .leaflet-popup-tip { background: #0f172a !important; }
    </style>
</head>
<body class="p-2 gap-2">

    <!-- HEADER -->
    <header class="flex justify-between items-center bg-slate-900/80 p-3 rounded-xl border border-white/5 shadow-2xl">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold italic tracking-tighter text-blue-500 uppercase leading-none">Global Flow <span class="text-white">Hazard v2</span></h1>
            <div class="flex items-center gap-2 bg-black/40 px-3 py-1 rounded-full border border-white/5">
                <div class="dot-live"></div>
                <span class="text-[10px] font-bold">SYSTEM LIVE</span>
            </div>
        </div>
        <div id="refresh-countdown" class="text-[10px] text-slate-500 font-bold">REFRESHING IN 10:00</div>
    </header>

    <!-- TOP BAR -->
    <div class="grid grid-cols-3 gap-2 flex-none">
        <div class="glass rounded-xl p-4 border-l-4 border-blue-500">
            <p class="text-[10px] text-slate-500 font-bold mb-1">SEOUL / KOREA</p>
            <div class="flex justify-between items-end">
                <div>
                    <p id="time-kr" class="text-2xl font-bold leading-none">00:00:00</p>
                    <p id="weather-kr" class="text-[11px] text-blue-300 mt-2 font-bold">Loading...</p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] text-slate-500 font-bold uppercase mb-1">USD/KRW</p>
                    <p id="val-fx" class="text-xl font-bold text-emerald-400 leading-none">----.--</p>
                </div>
            </div>
        </div>
        <div class="glass rounded-xl p-4 border-l-4 border-red-500">
            <p class="text-[10px] text-slate-500 font-bold mb-1">NEW YORK / USA</p>
            <p id="time-us" class="text-2xl font-bold text-red-400 leading-none">00:00:00</p>
            <p id="weather-us" class="text-[11px] text-red-300 mt-2 font-bold">Loading...</p>
        </div>
        <div class="glass rounded-xl p-4 border-l-4 border-amber-500">
            <p class="text-[10px] text-slate-500 font-bold mb-1">LONDON / UK</p>
            <p id="time-uk" class="text-2xl font-bold text-amber-400 leading-none">00:00:00</p>
            <p id="weather-uk" class="text-[11px] text-amber-300 mt-2 font-bold">Loading...</p>
        </div>
    </div>

    <!-- MAIN MAP AREA -->
    <div id="map-container" class="glass rounded-xl overflow-hidden shadow-2xl">
        <div id="map"></div>
        <!-- LEGEND -->
        <div class="absolute bottom-4 left-4 z-[1000] bg-black/90 p-3 rounded-lg border border-white/10 flex flex-col gap-2">
            <h3 class="text-[10px] font-bold text-slate-400 mb-1 tracking-widest uppercase">Global Legend</h3>
            <div class="flex items-center gap-3 text-[10px]"><span class="w-3 h-3 rounded-full bg-red-600 shadow-[0_0_5px_red]"></span> Earthquake (Mag 4.5+)</div>
            <div class="flex items-center gap-3 text-[10px]"><span class="w-3 h-3 rounded-full bg-blue-500"></span> System Node</div>
        </div>
    </div>

    <script>
        const REFRESH_MS = 600000;
        let countdown = REFRESH_MS / 1000;
        let map;

        window.onload = () => {
            initMap();
            updateAll();
            setInterval(updateClocks, 1000);
            setInterval(tick, 1000);
            setInterval(updateAll, REFRESH_MS);
        };

        function initMap() {
            // 지도가 그려질 영역을 초기화
            map = L.map('map', { 
                center: [20, 0], 
                zoom: 2.5, 
                zoomControl: false, 
                attributionControl: false 
            });

            // 타일 주소를 더 안정적인 주소로 변경 (CartoDB Dark Matter)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);

            // 지도가 화면 크기에 맞게 다시 계산되도록 강제 명령
            setTimeout(() => { map.invalidateSize(); }, 500);
        }

        function updateAll() {
            updateFX();
            updateWeather();
            updateHazards();
        }

        async function updateFX() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await res.json();
                document.getElementById('val-fx').textContent = data.rates.KRW.toFixed(2);
            } catch (e) {}
        }

        async function updateWeather() {
            const cities = [
                { id: 'kr', lat: 37.56, lon: 126.97 },
                { id: 'us', lat: 40.71, lon: -74.00 },
                { id: 'uk', lat: 51.50, lon: -0.12 }
            ];

            cities.forEach(async (city) => {
                try {
                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current_weather=true`);
                    const data = await res.json();
                    const temp = data.current_weather.temperature;
                    const codes = {0: "Clear", 1: "Mainly Clear", 2: "Partly Cloudy", 3: "Overcast", 45: "Fog", 61: "Rain"};
                    const status = codes[data.current_weather.weathercode] || "Active";
                    document.getElementById(`weather-${city.id}`).textContent = `${temp}°C / ${status}`;
                } catch (e) {}
            });
        }

        async function updateHazards() {
            try {
                const res = await fetch('https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/4.5_day.geojson');
                const data = await res.json();
                
                // 기존 마커 삭제
                map.eachLayer(l => { if (l instanceof L.CircleMarker) map.removeLayer(l); });

                data.features.forEach(f => {
                    const [lon, lat] = f.geometry.coordinates;
                    L.circleMarker([lat, lon], {
                        radius: Math.max(f.properties.mag * 2, 4),
                        color: '#ef4444',
                        weight: 1,
                        fillColor: '#ef4444',
                        fillOpacity: 0.5
                    }).addTo(map).bindPopup(`<b>Magnitude ${f.properties.mag}</b><br>${f.properties.place}`);
                });
            } catch (e) {}
        }

        function updateClocks() {
            const f = (tz) => new Intl.DateTimeFormat('en-GB', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false, timeZone:tz }).format(new Date());
            document.getElementById('time-kr').textContent = f('Asia/Seoul');
            document.getElementById('time-us').textContent = f('America/New_York');
            document.getElementById('time-uk').textContent = f('Europe/London');
        }

        function tick() {
            countdown--;
            if (countdown <= 0) countdown = REFRESH_MS / 1000;
            const m = Math.floor(countdown / 60).toString().padStart(2, '0');
            const s = (countdown % 60).toString().padStart(2, '0');
            document.getElementById('refresh-countdown').textContent = `REFRESHING IN ${m}:${s}`;
        }
    </script>
</body>
</html>
