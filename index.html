<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL FLOW - Intelligence Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #02040a;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #e2e8f0;
            margin: 0;
            height: 100vh;
            overflow: hidden; /* 전체 스크롤 방지 */
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); border: 1px solid rgba(51, 65, 85, 0.3); }
        
        /* 뉴스 컨테이너 내부 스크롤 설정 */
        .news-scroll { flex-grow: 1; overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none; }
        .news-scroll::-webkit-scrollbar { width: 2px; }
        .news-scroll::-webkit-scrollbar-thumb { background: #334155; }

        .news-card { border-bottom: 1px solid rgba(51, 65, 85, 0.2); padding: 8px 10px; transition: background 0.2s; }
        .news-card:hover { background: rgba(255, 255, 255, 0.03); }

        #map { height: 100%; width: 100%; background: #02040a; border-radius: 0 0 12px 12px; }
        
        /* 구글 번역기 숨기기 및 스타일 */
        #google_translate_element { height: 32px; overflow: hidden; border-radius: 4px; border: 1px solid #334155; }
        .goog-te-banner-frame.skiptranslate { display: none !important; }
        body { top: 0px !important; }

        /* 애니메이션 */
        .skel { background: linear-gradient(90deg, rgba(51,65,85,0.2) 25%, rgba(51,65,85,0.3) 37%, rgba(51,65,85,0.2) 63%); background-size: 400% 100%; animation: skel 1.4s ease infinite; }
        @keyframes skel { 0% { background-position: 100% 50%; } 100% { background-position: 0 50%; } }
        
        .dot-live { background: #10b981; }
        .dot-loading { background: #f59e0b; }
        .dot-error { background: #ef4444; }
    </style>
</head>
<body class="flex flex-col p-2 gap-2">

    <!-- HEADER: 초슬림형 -->
    <header class="flex-none flex items-center justify-between bg-slate-900/50 p-2 px-4 rounded-xl border border-white/5">
        <div class="flex items-center gap-6">
            <h1 class="text-xl font-black italic tracking-tighter text-white uppercase">Global <span class="text-blue-500">Flow</span></h1>
            <div id="google_translate_element"></div>
        </div>

        <div class="flex gap-6 items-center">
            <div class="flex items-center gap-4 border-r border-slate-700 pr-6">
                <div class="text-right leading-none">
                    <p class="text-[8px] text-slate-500 font-bold uppercase mb-1">Seoul</p>
                    <p id="time-kr" class="text-xs font-mono font-bold text-white">00:00:00</p>
                </div>
                <div class="text-right leading-none">
                    <p class="text-[8px] text-slate-500 font-bold uppercase mb-1">New York</p>
                    <p id="time-us" class="text-xs font-mono font-bold text-blue-400">00:00:00</p>
                </div>
                <div class="text-right leading-none">
                    <p class="text-[8px] text-slate-500 font-bold uppercase mb-1">London</p>
                    <p id="time-uk" class="text-xs font-mono font-bold text-amber-400">00:00:00</p>
                </div>
            </div>
            <span id="refresh-countdown" class="text-[9px] font-mono text-slate-500 bg-white/5 px-2 py-1 rounded">NEXT: 00:00</span>
        </div>
    </header>

    <!-- MARKET BOARD: 한 줄로 통합 -->
    <div class="flex-none grid grid-cols-6 gap-2 h-14">
        <div class="glass rounded-xl flex flex-col items-center justify-center">
            <span class="text-[8px] font-bold text-slate-500 uppercase">USD/KRW</span>
            <span id="val-usd" class="text-sm font-mono font-bold text-emerald-400">----.--</span>
        </div>
        <div class="glass rounded-xl flex flex-col items-center justify-center">
            <span class="text-[8px] font-bold text-slate-500 uppercase">KOSPI</span>
            <span id="val-kospi" class="text-sm font-mono font-bold text-slate-300">----.--</span>
            <span id="chg-kospi" class="text-[8px] font-mono">--</span>
        </div>
        <div class="glass rounded-xl flex flex-col items-center justify-center">
            <span class="text-[8px] font-bold text-slate-500 uppercase">NASDAQ</span>
            <span id="val-nasdaq" class="text-sm font-mono font-bold text-slate-300">----.--</span>
            <span id="chg-nasdaq" class="text-[8px] font-mono">--</span>
        </div>
        <div class="glass rounded-xl flex flex-col items-center justify-center">
            <span class="text-[8px] font-bold text-slate-500 uppercase">BTC/USDT</span>
            <span id="val-btc" class="text-sm font-mono font-bold text-orange-400">--.---</span>
            <span id="chg-btc" class="text-[8px] font-mono">--</span>
        </div>
        <div class="glass rounded-xl flex flex-col items-center justify-center">
            <span class="text-[8px] font-bold text-slate-500 uppercase">ETH/USDT</span>
            <span id="val-eth" class="text-sm font-mono font-bold text-indigo-400">--.---</span>
            <span id="chg-eth" class="text-[8px] font-mono">--</span>
        </div>
        <div class="glass rounded-xl flex flex-col items-center justify-center">
            <span class="text-[8px] font-bold text-slate-500 uppercase">S&P 500</span>
            <span id="val-sp500" class="text-sm font-mono font-bold text-slate-300">----.--</span>
            <span id="chg-sp500" class="text-[8px] font-mono">--</span>
        </div>
    </div>

    <!-- MAIN SECTION: 나머지 공간 모두 차지 -->
    <main class="flex-grow grid grid-cols-12 gap-2 min-h-0">
        
        <!-- NEWS FEED AREA -->
        <div class="col-span-8 grid grid-cols-3 gap-2 min-h-0">
            <!-- KR NEWS -->
            <section class="glass rounded-xl flex flex-col min-h-0">
                <div class="flex-none p-2 px-3 border-b border-white/5 flex justify-between items-center bg-blue-500/5">
                    <h2 class="text-[9px] font-bold tracking-widest text-blue-400 uppercase">Intelligence: KR</h2>
                    <span id="status-news-kr" class="w-1.5 h-1.5 rounded-full dot-loading animate-pulse"></span>
                </div>
                <div id="news-kr" class="news-scroll"></div>
            </section>

            <!-- US NEWS -->
            <section class="glass rounded-xl flex flex-col min-h-0">
                <div class="flex-none p-2 px-3 border-b border-white/5 flex justify-between items-center bg-red-500/5">
                    <h2 class="text-[9px] font-bold tracking-widest text-red-400 uppercase">Intelligence: US</h2>
                    <span id="status-news-us" class="w-1.5 h-1.5 rounded-full dot-loading animate-pulse"></span>
                </div>
                <div id="news-us" class="news-scroll"></div>
            </section>

            <!-- GLOBAL NEWS -->
            <section class="glass rounded-xl flex flex-col min-h-0">
                <div class="flex-none p-2 px-3 border-b border-white/5 flex justify-between items-center bg-emerald-500/5">
                    <h2 class="text-[9px] font-bold tracking-widest text-emerald-400 uppercase">Intelligence: Global</h2>
                    <span id="status-news-global" class="w-1.5 h-1.5 rounded-full dot-loading animate-pulse"></span>
                </div>
                <div id="news-global" class="news-scroll"></div>
            </section>
        </div>

        <!-- MAP AREA -->
        <div class="col-span-4 flex flex-col glass rounded-xl min-h-0 relative overflow-hidden">
            <div class="flex-none p-2 px-3 border-b border-white/5 flex justify-between items-center bg-black/40 absolute top-0 w-full z-[1000]">
                <h2 class="text-[9px] font-bold tracking-widest text-slate-400 uppercase">Hazard Monitor</h2>
                <div class="flex gap-3">
                    <div class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-red-500"></span><span class="text-[8px]">EQ</span></div>
                    <div class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-orange-500"></span><span class="text-[8px]">Alert</span></div>
                </div>
            </div>
            <div id="map"></div>
        </div>
    </main>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'auto', includedLanguages: 'ko,en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        const REFRESH_INTERVAL_MS = 600000;
        let secondsToRefresh = REFRESH_INTERVAL_MS / 1000;
        let map;

        window.onload = () => {
            lucide.createIcons();
            initMap();
            updateClocks();
            updateMarkets();
            fetchAllNews();
            fetchDisasters();
            
            setInterval(updateClocks, 1000);
            setInterval(tickCountdown, 1000);
            setInterval(() => {
                fetchAllNews();
                fetchDisasters();
            }, REFRESH_INTERVAL_MS);
            setInterval(updateMarkets, 300000);
        };

        function initMap() {
            map = L.map('map', { center: [25, 10], zoom: 2, zoomControl: false, attributionControl: false });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        async function fetchAllNews() {
            getNews('속보 OR 정치 OR 경제', 'ko', 'news-kr');
            getNews('Breaking OR Politics OR Economy', 'en', 'news-us');
            getNews('World OR Geopolitics', 'en', 'news-global');
        }

        async function getNews(query, lang, containerId) {
            const container = document.getElementById(containerId);
            const status = document.getElementById('status-' + containerId);
            status.className = 'w-1.5 h-1.5 rounded-full dot-loading animate-pulse';
            
            const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=${lang}&gl=${lang === 'ko' ? 'KR' : 'US'}&ceid=${lang === 'ko' ? 'KR:ko' : 'US:en'}`;
            
            try {
                const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(rssUrl)}`);
                const text = await res.text();
                const xml = new DOMParser().parseFromString(text, "text/xml");
                const items = Array.from(xml.querySelectorAll('item')).slice(0, 20);
                
                container.innerHTML = items.map(item => `
                    <a href="${item.querySelector('link').textContent}" target="_blank" class="news-card block">
                        <div class="flex justify-between mb-0.5">
                            <span class="text-[8px] font-bold text-blue-500 uppercase">${item.querySelector('source')?.textContent || 'News'}</span>
                            <span class="text-[8px] text-slate-600">${new Date(item.querySelector('pubDate').textContent).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                        </div>
                        <h3 class="text-[11.5px] font-medium text-slate-300 leading-tight">${item.querySelector('title').textContent}</h3>
                    </a>
                `).join('');
                status.className = 'w-1.5 h-1.5 rounded-full dot-live';
            } catch (e) {
                status.className = 'w-1.5 h-1.5 rounded-full dot-error';
            }
        }

        async function updateMarkets() {
            try {
                // USD/KRW
                const fx = await (await fetch('https://open.er-api.com/v6/latest/USD')).json();
                document.getElementById('val-usd').textContent = fx.rates.KRW.toFixed(2);

                // Crypto
                const symbols = { btc: 'BTCUSDT', eth: 'ETHUSDT' };
                for (const [id, sym] of Object.entries(symbols)) {
                    const res = await (await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${sym}`)).json();
                    const price = parseFloat(res.lastPrice);
                    const pct = parseFloat(res.priceChangePercent);
                    document.getElementById(`val-${id}`).textContent = price.toLocaleString();
                    const chg = document.getElementById(`chg-${id}`);
                    chg.textContent = `${pct > 0 ? '+' : ''}${pct.toFixed(2)}%`;
                    chg.className = `text-[8px] font-mono ${pct >= 0 ? 'text-emerald-500' : 'text-red-500'}`;
                }

                // Stocks
                const stocks = { kospi: '%5EKS11', nasdaq: '%5EIXIC', sp500: '%5EGSPC' };
                for (const [id, sym] of Object.entries(stocks)) {
                    const res = await (await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/' + sym)}`)).json();
                    const meta = res.chart.result[0].meta;
                    const price = meta.regularMarketPrice;
                    const pct = ((price - meta.previousClose) / meta.previousClose * 100);
                    document.getElementById(`val-${id}`).textContent = price.toFixed(2);
                    const chg = document.getElementById(`chg-${id}`);
                    chg.textContent = `${pct > 0 ? '+' : ''}${pct.toFixed(2)}%`;
                    chg.className = `text-[8px] font-mono ${pct >= 0 ? 'text-emerald-400' : 'text-red-400'}`;
                }
            } catch (e) {}
        }

        async function fetchDisasters() {
            map.eachLayer(l => { if (l instanceof L.CircleMarker) map.removeLayer(l); });
            try {
                const eq = await (await fetch('https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/4.5_day.geojson')).json();
                eq.features.forEach(f => {
                    const [lon, lat] = f.geometry.coordinates;
                    L.circleMarker([lat, lon], { radius: f.properties.mag * 1.5, color: '#ef4444', fillOpacity: 0.5 }).addTo(map);
                });
            } catch (e) {}
        }

        function updateClocks() {
            const f = (tz) => new Intl.DateTimeFormat('en-GB', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false, timeZone:tz }).format(new Date());
            document.getElementById('time-kr').textContent = f('Asia/Seoul');
            document.getElementById('time-us').textContent = f('America/New_York');
            document.getElementById('time-uk').textContent = f('Europe/London');
        }

        function tickCountdown() {
            secondsToRefresh--;
            if (secondsToRefresh <= 0) secondsToRefresh = REFRESH_INTERVAL_MS / 1000;
            const m = Math.floor(secondsToRefresh / 60).toString().padStart(2, '0');
            const s = (secondsToRefresh % 60).toString().padStart(2, '0');
            document.getElementById('refresh-countdown').textContent = `NEXT: ${m}:${s}`;
        }
    </script>
</body>
</html>
