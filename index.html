<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GLOBAL MONITOR - Open Intelligence Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'JetBrains Mono',monospace;
    background:#02040a;
    color:#e2e8f0;
    height:100vh;
    margin:0;
    overflow:hidden;
}

.glass{
    background:rgba(15,23,42,.85);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.08);
}

#map{
    height:100%;
    width:100%;
}

.dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#10b981;
    box-shadow:0 0 10px #10b981;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    50%{opacity:.3}
}

.row{
    border-bottom:1px solid rgba(255,255,255,.05);
    padding:10px 0;
}
</style>

</head>


<body class="p-2 flex flex-col gap-2">


<header class="glass rounded-xl p-4 flex justify-between items-center">

<div class="flex items-center gap-4">

<h1 class="text-xl font-bold text-cyan-400">
GLOBAL <span class="text-white">MONITOR</span>
</h1>

<div class="flex items-center gap-2 text-xs">
<div class="dot"></div>
<span id="clock">00:00:00</span>
</div>

</div>


<div class="text-[10px] text-slate-400">
OPEN DATA INTELLIGENCE PLATFORM
</div>


</header>



<main class="flex-1 grid grid-cols-12 gap-2 min-h-0">


<section class="glass rounded-xl p-4 col-span-3 overflow-auto">

<h2 class="text-xs text-cyan-400 font-bold mb-3">
AIR QUALITY MONITOR
</h2>

<div id="air"></div>


<h2 class="text-xs text-red-400 font-bold mt-6 mb-3">
EARTHQUAKE EVENTS
</h2>

<div id="quake-count">
SYNCING...
</div>


<h2 class="text-xs text-yellow-400 font-bold mt-6 mb-3">
DATA SOURCES
</h2>

<div class="text-[10px] text-slate-400 leading-5">

USGS Earthquake<br>
Open-Meteo Air Quality<br>
ISS Public Tracking<br>
NOAA Space Weather

</div>


</section>



<section class="glass rounded-xl overflow-hidden col-span-9 relative">

<div id="map"></div>


<div class="absolute top-4 right-4 z-[999] 
bg-black/70 p-3 rounded-lg text-xs">

<div class="text-cyan-400 font-bold">
ISS TRACKING
</div>

<div id="iss">
SYNCING...
</div>

</div>


<div class="absolute bottom-4 left-4 z-[999]
bg-black/70 p-3 rounded text-xs">

<span class="text-red-500">●</span>
Earthquake

&nbsp;

<span class="text-green-400">●</span>
AQI Node

&nbsp;

<span class="text-blue-400">●</span>
ISS

</div>


</section>


</main>


<script>


let map;
let issMarker;

let quakeMarkers=[];
let airMarkers=[];



window.onload=()=>{

initMap();

loadAir();
loadEarthquakes();
loadISS();

setInterval(clock,1000);
setInterval(loadISS,5000);

};



function initMap(){

map=L.map('map',{
center:[20,0],
zoom:2,
minZoom:2
});


L.tileLayer(
'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
).addTo(map);



issMarker=L.circleMarker(
[0,0],
{
radius:7,
color:'#00ffff',
fillColor:'#3b82f6',
fillOpacity:1
}
).addTo(map);


}




async function loadAir(){


const cities=[

["SEOUL",37.56,126.97],
["LONDON",51.5,-0.1],
["NEW YORK",40.7,-74],
["TOKYO",35.6,139.6],
["SYDNEY",-33.8,151.2]

];


let box=document.getElementById("air");

box.innerHTML="";


for(const c of cities){


try{

let r=await fetch(
`https://air-quality-api.open-meteo.com/v1/air-quality?
latitude=${c[1]}&
longitude=${c[2]}&
current=us_aqi`
.replace(/\s/g,"")
);


let d=await r.json();

let aqi=d.current.us_aqi;


box.innerHTML+=`

<div class="row flex justify-between">

<span>${c[0]}</span>

<span class="font-bold ${
aqi>100?'text-red-400':
aqi>50?'text-yellow-400':
'text-green-400'
}">
${aqi}
</span>

</div>

`;


let marker=L.circleMarker(
[c[1],c[2]],
{
radius:7,
color:"#10b981",
fillOpacity:.6
}
).addTo(map);


airMarkers.push(marker);


}catch(e){}


}


}




async function loadEarthquakes(){


quakeMarkers.forEach(x=>map.removeLayer(x));

quakeMarkers=[];


let r=await fetch(
"https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/4.5_day.geojson"
);


let d=await r.json();


document.getElementById("quake-count")
.innerHTML=
`${d.features.length} events detected`;



d.features.forEach(q=>{


let [lon,lat]=q.geometry.coordinates;

let m=L.circleMarker(
[lat,lon],
{
radius:q.properties.mag*2,
color:"#ef4444",
fillOpacity:.35
}
).addTo(map);


quakeMarkers.push(m);


});


}




async function loadISS(){


try{


let r=await fetch(
"https://api.wheretheiss.at/v1/satellites/25544"
);


let d=await r.json();


issMarker.setLatLng(
[d.latitude,d.longitude]
);


document.getElementById("iss")
.innerHTML=
`
${Math.abs(d.latitude).toFixed(1)}
${d.latitude>0?'N':'S'}
<br>
${Math.abs(d.longitude).toFixed(1)}
${d.longitude>0?'E':'W'}
`;



}catch(e){}



}





function clock(){

document.getElementById("clock")
.innerHTML=
new Date().toLocaleTimeString(
"ko-KR"
);

}



</script>


</body>
</html>
