<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE COMMAND CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #05070a; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.4); }
        .pulse-red { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10">

    <header class="max-w-7xl mx-auto mb-10 flex flex-col md:flex-row justify-between items-end gap-6">
        <div>
            <div class="flex items-center gap-3 mb-2">
                <div class="flex items-center gap-2 px-3 py-1 bg-emerald-500/10 border border-emerald-500/20 rounded-full">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    <span class="text-[10px] font-bold text-emerald-500 tracking-widest uppercase font-mono">System Active</span>
                </div>
                <span id="clock" class="text-slate-500 font-mono text-xs tracking-wider">00:00:00 KST</span>
            </div>
            <h1 class="text-5xl font-black tracking-tighter text-white italic uppercase">Realtime <span class="text-slate-700">Feed</span></h1>
        </div>
        
        <div class="flex items-center gap-6 border-l border-slate-800 pl-8">
            <div id="fx-header">
                <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">USD / KRW</p>
                <p class="text-xl font-mono font-bold text-white tracking-tighter" id="header-usd">Loading...</p>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-6">
        
        <!-- 실시간 뉴스 섹션 (가장 큼) -->
        <div class="md:col-span-3 md:row-span-2 glass rounded-[2.5rem] p-8">
            <div class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-2 text-emerald-500 font-bold text-xs uppercase tracking-widest">
                    <i data-lucide="newspaper" class="w-4 h-4"></i> 실시간 주요 뉴스 (구글 뉴스)
                </div>
                <button onclick="fetchNews()" class="hover:rotate-180 transition-transform duration-500">
                    <i data-lucide="refresh-cw" class="w-4 h-4 text-slate-500"></i>
                </button>
            </div>

            <!-- 뉴스 데이터가 주입되는 곳 -->
            <div id="news-container" class="space-y-8">
                <p class="text-slate-500 animate-pulse">데이터를 불러오는 중입니다...</p>
            </div>
        </div>

        <!-- 실시간 시장 데이터 (우측) -->
        <div class="md:col-span-1 space-y-4">
            <div class="glass p-6 rounded-[2rem] border-l-4 border-l-emerald-500">
                <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">실시간 환율</p>
                <h3 class="text-3xl font-mono font-bold text-white mb-1" id="main-usd">---.--</h3>
                <p class="text-xs text-emerald-500 font-bold">LIVE RATE (KRW)</p>
            </div>
            
            <div class="glass p-6 rounded-[2rem]">
                <p class="text-[10px] text-slate-500 font-bold uppercase mb-4 tracking-widest text-center">Market Index</p>
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="text-sm font-bold text-slate-400 font-mono">KOSPI</span>
                        <span class="text-sm font-bold text-red-500 italic">2,684.20 ▲</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-sm font-bold text-slate-400 font-mono">NASDAQ</span>
                        <span class="text-sm font-bold text-red-500 italic">16,342.1 ▲</span>
                    </div>
                </div>
                <p class="text-[9px] text-slate-600 mt-6 text-center italic">*증시 지수는 15분 지연된 샘플 데이터입니다.</p>
            </div>
        </div>

        <!-- X (트위터) 빠른 연결 -->
        <div class="md:col-span-4 glass p-6 rounded-[2rem] flex flex-col md:flex-row gap-6 items-center">
            <div class="flex items-center gap-3">
                <i data-lucide="twitter" class="w-5 h-5 text-blue-400"></i>
                <span class="text-sm font-bold uppercase tracking-widest">X Trends</span>
            </div>
            <div class="flex flex-wrap gap-3">
                <a href="https://x.com/search?q=환율" target="_blank" class="px-4 py-2 bg-slate-800/50 rounded-full border border-slate-700 text-xs hover:border-blue-400 transition-all">#환율</a>
                <a href="https://x.com/search?q=코스피" target="_blank" class="px-4 py-2 bg-slate-800/50 rounded-full border border-slate-700 text-xs hover:border-blue-400 transition-all">#코스피</a>
                <a href="https://x.com/search?q=금리" target="_blank" class="px-4 py-2 bg-slate-800/50 rounded-full border border-slate-700 text-xs hover:border-blue-400 transition-all">#금리</a>
            </div>
        </div>
    </main>

    <script>
        // 1. 실시간 뉴스 가져오기 (구글 뉴스 RSS 이용)
        async function fetchNews() {
            const newsContainer = document.getElementById('news-container');
            // 구글 뉴스 경제 섹션 RSS를 JSON으로 변환해주는 프록시 사용
            const rssUrl = encodeURIComponent('https://news.google.com/rss/search?q=경제+증시&hl=ko&gl=KR&ceid=KR:ko');
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                if (data.status === 'ok') {
                    newsContainer.innerHTML = '';
                    data.items.slice(0, 5).forEach((item, index) => {
                        const date = new Date(item.pubDate).toLocaleTimeString('ko-KR', {hour: '2-digit', minute:'2-digit'});
                        const html = `
                            <a href="${item.link}" target="_blank" class="block group border-b border-slate-800/50 pb-6 last:border-0">
                                <div class="flex items-center gap-3 mb-2">
                                    <span class="text-[10px] font-bold text-emerald-500 border border-emerald-500/30 px-1.5 py-0.5 rounded uppercase">Latest</span>
                                    <span class="text-[10px] text-slate-500 font-mono">${date}</span>
                                </div>
                                <h3 class="text-xl font-bold text-white group-hover:text-emerald-400 transition-colors leading-tight mb-2">
                                    ${item.title}
                                </h3>
                                <p class="text-sm text-slate-500 line-clamp-1">${item.description.replace(/<[^>]*>?/gm, '')}</p>
                            </a>
                        `;
                        newsContainer.innerHTML += html;
                    });
                }
            } catch (error) {
                newsContainer.innerHTML = '<p class="text-red-500">뉴스를 불러오지 못했습니다.</p>';
            }
        }

        // 2. 실시간 환율 가져오기
        async function fetchExchangeRate() {
            try {
                // 무료 환율 API (키 필요 없음)
                const response = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await response.json();
                const rate = data.rates.KRW.toFixed(2);
                
                document.getElementById('header-usd').textContent = rate;
                document.getElementById('main-usd').textContent = rate;
            } catch (error) {
                console.error('환율 정보 실패');
            }
        }

        // 3. 초기화 및 시계 작동
        function init() {
            lucide.createIcons();
            fetchNews();
            fetchExchangeRate();
            
            // 1초마다 시계 업데이트
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock').textContent = now.toLocaleTimeString('ko-KR', { hour12: false }) + ' KST';
            }, 1000);

            // 10분마다 데이터 자동 새로고침
            setInterval(() => {
                fetchNews();
                fetchExchangeRate();
            }, 600000);
        }

        init();
    </script>
</body>
</html>
