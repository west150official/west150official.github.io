<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL COMMAND CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020408; color: #e2e8f0; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .news-card { transition: all 0.2s ease; border-bottom: 1px solid rgba(51, 65, 85, 0.3); }
        .news-card:hover { background: rgba(255, 255, 255, 0.05); transform: translateX(5px); }
        .status-tag { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 800; text-transform: uppercase; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .emergency { color: #ef4444; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="min-h-screen p-3 md:p-6">

    <!-- TOP HEADER -->
    <header class="max-w-[1800px] mx-auto mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-4">
            <div class="p-2 bg-red-500/10 rounded-xl border border-red-500/20">
                <i data-lucide="radio" class="w-6 h-6 text-red-500 animate-pulse"></i>
            </div>
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-white italic uppercase leading-none">Live <span class="text-slate-600">Command</span></h1>
                <p id="clock" class="text-[10px] font-mono text-slate-500 mt-1">00:00:00 KST</p>
            </div>
        </div>
        
        <!-- MARKET BAR -->
        <div class="flex flex-wrap justify-center gap-3">
            <div class="glass px-4 py-2 rounded-xl flex flex-col items-center min-w-[100px]">
                <span class="text-[9px] text-slate-500 font-bold uppercase">USD/KRW</span>
                <span id="rate-usd" class="text-sm font-mono font-bold text-emerald-400">Loading..</span>
            </div>
            <div class="glass px-4 py-2 rounded-xl flex flex-col items-center min-w-[100px]">
                <span class="text-[9px] text-slate-500 font-bold uppercase">KOSPI</span>
                <span class="text-sm font-mono font-bold text-red-500">2,642.1 ▲</span>
            </div>
            <div class="glass px-4 py-2 rounded-xl flex flex-col items-center min-w-[100px]">
                <span class="text-[9px] text-slate-500 font-bold uppercase">KOSDAQ</span>
                <span class="text-sm font-mono font-bold text-red-500">862.4 ▲</span>
            </div>
            <div class="glass px-4 py-2 rounded-xl flex flex-col items-center min-w-[100px]">
                <span class="text-[9px] text-slate-500 font-bold uppercase">NASDAQ</span>
                <span class="text-sm font-mono font-bold text-red-400">16,175.2</span>
            </div>
        </div>
    </header>

    <main class="max-w-[1800px] mx-auto grid grid-cols-1 lg:grid-cols-2 gap-6">
        
        <!-- KOREA FEED: 정치, 경제, 재난, 속보 -->
        <section class="glass rounded-[2rem] overflow-hidden flex flex-col h-[780px]">
            <div class="p-5 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-blue-500 rounded-full shadow-[0_0_10px_rgba(59,130,246,0.5)]"></span>
                    <h2 class="text-xs font-bold tracking-[0.2em] uppercase text-blue-400">South Korea Briefing</h2>
                </div>
                <button onclick="updateKRNews()" class="text-slate-600 hover:text-white transition-colors">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                </button>
            </div>
            <div id="kr-news" class="flex-1 overflow-y-auto p-2">
                <div class="p-10 text-center text-slate-600 animate-pulse text-sm">신호 대기 중...</div>
            </div>
        </section>

        <!-- USA FEED: Politics, Economy, Disaster, Breaking -->
        <section class="glass rounded-[2rem] overflow-hidden flex flex-col h-[780px]">
            <div class="p-5 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-amber-500 rounded-full shadow-[0_0_10px_rgba(245,158,11,0.5)]"></span>
                    <h2 class="text-xs font-bold tracking-[0.2em] uppercase text-amber-400">United States Briefing</h2>
                </div>
                <button onclick="updateUSNews()" class="text-slate-600 hover:text-white transition-colors">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                </button>
            </div>
            <div id="us-news" class="flex-1 overflow-y-auto p-2">
                <div class="p-10 text-center text-slate-600 animate-pulse text-sm">Awaiting Signal...</div>
            </div>
        </section>

    </main>

    <script>
        // 뉴스 소스 설정 (정치, 경제, 재난, 속보 키워드 조합)
        const KR_QUERY = '속보 OR 정치 OR 경제 OR 재난 OR 사고';
        const US_QUERY = 'Breaking OR Politics OR Economy OR Disaster OR Emergency';

        async function fetchNews(query, lang, containerId) {
            const container = document.getElementById(containerId);
            const region = lang === 'ko' ? 'KR' : 'US';
            const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=${lang}&gl=${region}&ceid=${region}:${lang}`;
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                if (data.status === 'ok') {
                    container.innerHTML = '';
                    data.items.slice(0, 15).forEach(item => {
                        const time = new Date(item.pubDate).toLocaleTimeString(lang === 'ko' ? 'ko-KR' : 'en-US', {
                            hour: '2-digit', minute: '2-digit'
                        });
                        
                        // 키워드에 따른 태그 생성
                        let tagHtml = `<span class="status-tag bg-slate-800 text-slate-400">NEW</span>`;
                        if (item.title.includes('속보') || item.title.includes('Breaking')) {
                            tagHtml = `<span class="status-tag bg-red-500/20 text-red-500 emergency">BREAKING</span>`;
                        } else if (item.title.includes('재난') || item.title.includes('사고') || item.title.includes('Disaster')) {
                            tagHtml = `<span class="status-tag bg-orange-500/20 text-orange-500">ALERT</span>`;
                        }

                        const article = document.createElement('a');
                        article.href = item.link;
                        article.target = "_blank";
                        article.className = "news-card block p-4 rounded-2xl mb-1 group";
                        article.innerHTML = `
                            <div class="flex items-center gap-3 mb-2">
                                ${tagHtml}
                                <span class="text-[10px] font-mono text-slate-600">${time}</span>
                                <span class="text-[10px] text-slate-700 uppercase font-bold tracking-tighter">${item.author || 'Source'}</span>
                            </div>
                            <h3 class="text-[14px] font-bold text-slate-300 group-hover:text-white leading-snug">
                                ${item.title}
                            </h3>
                        `;
                        container.appendChild(article);
                    });
                }
            } catch (e) {
                container.innerHTML = `<div class="p-10 text-red-500/50 text-xs text-center">Feed error. Please refresh.</div>`;
            }
        }

        async function updateExchangeRate() {
            try {
                const response = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await response.json();
                const rate = data.rates.KRW.toFixed(2);
                document.getElementById('rate-usd').textContent = `${rate} KRW`;
            } catch (e) { console.error('Rate fail'); }
        }

        function updateKRNews() { fetchNews(KR_QUERY, 'ko', 'kr-news'); }
        function updateUSNews() { fetchNews(US_QUERY, 'en', 'us-news'); }

        function init() {
            lucide.createIcons();
            updateKRNews();
            updateUSNews();
            updateExchangeRate();
            
            // 시계
            setInterval(() => {
                document.getElementById('clock').textContent = new Date().toLocaleTimeString('ko-KR', { hour12: false }) + ' KST';
            }, 1000);

            // 10분마다 데이터 갱신
            setInterval(() => {
                updateKRNews();
                updateUSNews();
                updateExchangeRate();
            }, 600000);
        }

        init();
    </script>
</body>
</html>
